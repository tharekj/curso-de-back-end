<!DOCTYPE html>
<html lag="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="widhth=device-width, initial-scale=1.0">
    <title>fomulário</title>
</head>

<body>

    <div>
        <form action="/login" method="post">
            <label for="username">nome de usuario:</label>
            <input type="text" name="username" id="username" placeholder="digite seu usuario" required><br><br>
    </div>

    <br>

    <div>
        <label for="password">senha:</label>
        <input type="password" name="password" id="password" placeholder="digite a sua senha"><br><br>
    </div>

    <br>

    <div>
        <label for="cpf">CPF:</label>
        <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" maxlength="14" oninput="maskCPF(this)">

        <script>
            function maskCPF(cpfInput) {
                // Remove caracteres não numéricos
                let value = cpfInput.value.replace(/\D/g, '');

                // Aplica a máscara: 000.000.000-00
                value = value.replace(/(\d{3})(\d)/, '$1.$2');
                value = value.replace(/(\d{3})(\d)/, '$1.$2');
                value = value.replace(/(\d{3})(\d{1,2})$/, '$1-$2');

                cpfInput.value = value;
            }
        </script>


    </div>

    <br>


    <div>

        <label for="telefone">Telefone</label>
        <input type="tel" id="telefone" class="input-padrao" required placeholder="(xx) xxxxx-xxxx">

    </div>

    <br>

    <div>
        <form>
            <label>CEP:</label>
            <input type="text" id="cep" name="cep" maxlength="9" placeholder="00000-000"
                onblur="pesquisacep(this.value)"><br>
            <br>
            <label>Rua:</label>
            <input type="text" id="rua" name="rua"><br>
            <br>
            <label>Bairro:</label>
            <input type="text" id="bairro" name="bairro"><br>
            <br>
            <label>Cidade:</label>
            <input type="text" id="cidade" name="cidade"><br>
            <br>
            <label>Estado:</label>
            <input type="text" id="uf" name="uf"><br>
        </form>
    </div>

    <br>

    <div>
        <label for="mensagem">mensagem:</label><br>
        <textarea name="mensagem" id="mensagem" cols="30" rows="5" placeholder="digite sua mensagem..."></textarea>
    </div>

    <br>
    <div>
        <form action="/enviar" method="POST">
            <p>Selecione seu gênero:</p>

            <input type="radio" id="masculino" name="genero" value="masculino">
            <label for="masculino">Masculino</label><br>

            <input type="radio" id="feminino" name="genero" value="feminino">
            <label for="feminino">Feminino</label><br>

            <input type="radio" id="outro" name="genero" value="outro">
            <label for="outro">Outro</label><br>

        </form>
    </div>

    <br>

    <div>
        <input type="checkbox" id="lembrar" name="lembrar">
        <label for="lembrar">lembrar meu login</label><br><br>
    </div>

    <br>

    <input type="submit" value="entrar">
    <input type="reset" value="limpar">


    </form>


</body>
</head>
