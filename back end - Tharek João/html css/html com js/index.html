<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo de Funções em JavaScript</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #111111;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 600px;
            background: rgb(44, 41, 41);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            color: #0077b6;
            margin-bottom: 25px;
        }

        .bloco {
            margin-bottom: 25px;
            padding: 20px;
            border: 1px solid #111111;
            border-radius: 10px;
            background: #0077b6;
        }

        .bloco h2 {
            font-size: 20px;
            margin-bottom: 15px;
            color: #333;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #bbb;
            border-radius: 6px;
            font-size: 16px;
        }

        button {
            background: #000000;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #005f8f;
        }

        .resultado {
            margin-top: 12px;
            font-weight: bold;
            color: #222;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Funções em JavaScript</h1>

        <div class="bloco">
            <h2>1. Saudação</h2>
            <input type="text" id="nome" placeholder="Digite seu nome">
            <button onclick="saudacao()">Saudar</button>
            <p class="resultado" id="resultadoSaudacao"></p>
        </div>

        <div class="bloco">
            <h2>2. Soma de dois números</h2>
            <input type="number" id="num1" placeholder="Digite o primeiro número">
            <input type="number" id="num2" placeholder="Digite o segundo número">
            <input type="number" id="num3" placeholder="Digite o terceiro número">
            <button onclick="somar()">Somar</button>
            <p class="resultado" id="resultadoSoma"></p>
        </div>

        <div class="bloco">
            <h2>3. Par ou Ímpar</h2>
            <input type="number" id="numero" placeholder="Digite um número">
            <button onclick="verificarParOuImpar()">Verificar</button>
            <p class="resultado" id="resultadoParImpar"></p>
        </div>
    </div>

    <script>
        function saudacao() {
            let nome = document.getElementById("nome").value;
            let resultado = document.getElementById("resultadoSaudacao");

            if (nome === "") {
                resultado.innerHTML = "Por favor, digite seu nome.";
            } else {
                resultado.innerHTML = "Olá, " + nome + "! Seja bem-vindo ao JavaScript.";
            }
        }

        function somar() {
            let num1 = Number(document.getElementById("num1").value);
            let num2 = Number(document.getElementById("num2").value);
            let num3 = Number(document.getElementById("num3").value);
            let resultado = document.getElementById("resultadoSoma");

            let soma = num1 + num2 + num3;
            resultado.innerHTML = "A soma é: " + soma;
        }

        function verificarParOuImpar() {
            let numero = Number(document.getElementById("numero").value);
            let resultado = document.getElementById("resultadoParImpar");

            if (numero % 2 === 0) {
                resultado.innerHTML = numero + " é um número PAR.";
            } else {
                resultado.innerHTML = numero + " é um número ÍMPAR.";
            }
        }
    </script>

</body>

</html>
