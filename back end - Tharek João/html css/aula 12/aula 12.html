<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 12</title>
</head>



<style>
    /*estilo geral da pagina*/
    body {
        font-family: Arial, Helvetica, sans-serif;
        background-color: #4f4f4f;

    }

    .container1 {
        display: flex;
        justify-content: center;
        align-items: flex-start;
    }

    /*primeira box*/
    .box1 {
        background: linear-gradient(135deg, #1e1e1e, #2b2b2b);
        color: white;
        padding: 25px;
        border-radius: 12px;
        text-align: center;


    }


    /*terceira div*/
    .box3 {
        background: linear-gradient(135deg, #1e1e1e, #2b2b2b);
        color: white;
        padding: 25px;
        border-radius: 12px;
        text-align: center;

    }

    /*ajustando a imagem*/
    .box3 img {
        width: 300px;
        height: 200px;


    }

    .galaxia-textos {
        background: linear-gradient(135deg, #1e1e1e, #2b2b2b);
        color: white;
        padding: 25px;
        border-radius: 12px;
        text-align: center;
    }

    .galaxia-textos h3 {
        margin: 6px 0;
        letter-spacing: 1px;
    }

    .card-perfil {
        background: linear-gradient(135deg, #1e1e1e, #2b2b2b);
        color: white;
        padding: 25px;
        border-radius: 12px;
        text-align: center;
    }

    .botão {
        background: #264de4;
        color: rgb(0, 0, 0);
        padding: 10px 20px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        transition: 0.3s;
    }

    .botão:hover {
        transform: translateY(-3px);
        box-shadow: 0 6px 14px rgba(0, 0, 0, 0.5);
    }
</style>

<body>
    <div class="container1">
        <div class="galaxia-textos">
            <h3>Hello, world!</h3>
            <h3>¡Hola, mundo!</h3>
            <h3>Bonjour, le monde !</h3>
            <h3>Ciao, mondo!</h3>
            <h3>Hallo, Welt!</h3>
            <h3>こんにちは、世界！</h3>
            <h3>你好，世界！</h3>
            <h3>안녕하세요, 세계!</h3>
            <h3>Привет, мир!</h3>
            <h3>مرحبا بالعالم!</h3>
            <h3>नमस्ते दुनिया!</h3>
            <h3>Olá, mundo!</h3>
        </div>

        <div class="card-perfil">
            <h2>Perfil do Usuário</h2>

            <img src="https://picsum.photos/150" alt="Foto de perfil">

            <p>
                Usuario anônimo
            </p>

            <a href="nao-fiz.html">
                <button class="botão">Seguir</button>
            </a>
        </div>

        <div class="box3">
            <h3>a box 3 com imagem</h3>
            <p>a imagem faz parte do conteudo da box.</p>
            <img src="PNGs/senac.png" alt="senac">
        </div>
    </div>

    </head>
</head>
</body>
